<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="petalGrad" cx="45%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#fff7ef"/>
      <stop offset="48%" stop-color="#f8d6c9"/>
      <stop offset="100%" stop-color="#e9a693"/>
    </radialGradient>
    <linearGradient id="petalShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9d8cb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c76e61" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c7654"/>
      <stop offset="100%" stop-color="#273622"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8c9272"/>
      <stop offset="100%" stop-color="#2d3d2c"/>
    </linearGradient>
    <linearGradient id="leafLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b4b28b"/>
      <stop offset="100%" stop-color="#737c59"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c55f"/>
      <stop offset="100%" stop-color="#bd7d28"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.13"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#fffdf9"/>

