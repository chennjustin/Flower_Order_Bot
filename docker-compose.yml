# 資料庫使用 backend/.env 的 Supabase（DATABASE_URL / DATABASE_ALEM_URL），不含本機 Postgres 容器。
services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      SKIP_ALEMBIC_ON_START: "1"
      # LINE 使用者傳圖後下載存档；給前端／LINE ImageSendMessage 用的公開基底網址（ngrok 請改成 https）
      PUBLIC_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command:
      - sh
      - -c
      - |
        if [ "$$SKIP_ALEMBIC_ON_START" != "1" ]; then alembic upgrade head; fi
        exec python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
