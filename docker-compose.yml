services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flower
      POSTGRES_USER: flower
      POSTGRES_PASSWORD: flower
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Override default sqlite with compose postgres
      DATABASE_URL: postgresql+asyncpg://flower:flower@db:5432/flower
      DATABASE_ALEM_URL: postgresql+psycopg2://flower:flower@db:5432/flower
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    environment:
      # For `npm run dev` inside container; build arg already bakes it for prod build.
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:

